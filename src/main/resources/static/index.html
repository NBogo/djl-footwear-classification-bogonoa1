<!DOCTYPE html>
<html>
<head>
    <title>Footwear Classification</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="app">
        <header>
            <h1>Footwear Classification</h1>
            <p class="subtitle">Deep Learning powered by DJL &amp; ResNet50 &mdash; bogonoa1</p>
            <div class="health-badge" id="healthBadge" title="Checking...">&#9679; checking</div>
        </header>

        <div class="upload-zone" id="dropZone">
            <div class="upload-icon">&#128065;</div>
            <p class="upload-text">Drag &amp; drop an image here</p>
            <p class="upload-or">or</p>
            <label class="upload-btn" for="image">Browse files</label>
            <input type="file" accept="image/png, image/jpeg" id="image" onchange="checkFiles(this.files);">
            <p class="upload-hint">PNG or JPEG, max 10 MB</p>
        </div>

        <div id="answerPart" class="hidden">
            <div class="results-grid">
                <div class="preview-card">
                    <img id="preview" src="#" alt="preview" />
                </div>
                <div class="results-card">
                    <div id="loadingPart" style="display:none;">
                        <div class="spinner"></div>
                        <p>Analyzing image...</p>
                    </div>
                    <div id="resultsPart" style="display:none;">
                        <div id="topResult" class="top-result" style="display:none;">
                            <span class="top-emoji" id="topEmoji"></span>
                            <span class="top-label" id="topLabel"></span>
                            <span class="top-pct" id="topPercentage"></span>
                        </div>
                        <div id="classificationList"></div>
                        <button class="reset-btn" onclick="resetUI()">Classify another</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <span>ZHAW MDM FS2026</span>
            <span id="infoText"></span>
        </footer>
    </div>
</body>
</html>
